<svg xmlns="http://www.w3.org/2000/svg" width="1160" height="720" viewBox="0 0 1160 720" role="img" aria-labelledby="title desc">
<title id="title">Candidate C3 pathway map</title>
<desc id="desc">Mechanistic network for C3 formation on Cu/Ag/Ru catalysts with candidate validation methods.</desc>
<rect width="1160" height="720" fill="#fffaf0"/>
<text x="48" y="54" font-size="28" font-weight="700" fill="#1f2328">Candidate routes to C3 oxygenates</text>
<text x="48" y="84" font-size="15" fill="#667085">Supplementary mechanism map: each route has a required experimental fingerprint</text>
<rect x="70" y="180" width="142" height="58" rx="12" fill="white" stroke="#0f766e" stroke-width="3"/>
<text x="141" y="215" text-anchor="middle" font-size="14" font-weight="700" fill="#0f766e">CO2</text>
<rect x="250" y="180" width="142" height="58" rx="12" fill="white" stroke="#0f766e" stroke-width="3"/>
<text x="321" y="215" text-anchor="middle" font-size="14" font-weight="700" fill="#0f766e">*CO on Ag/Cu</text>
<rect x="450" y="130" width="142" height="58" rx="12" fill="white" stroke="#2563eb" stroke-width="3"/>
<text x="521" y="165" text-anchor="middle" font-size="14" font-weight="700" fill="#2563eb">*OCCO</text>
<rect x="645" y="130" width="142" height="58" rx="12" fill="white" stroke="#2563eb" stroke-width="3"/>
<text x="716" y="165" text-anchor="middle" font-size="14" font-weight="700" fill="#2563eb">C2 aldehyde pool</text>
<rect x="840" y="130" width="142" height="58" rx="12" fill="white" stroke="#c2410c" stroke-width="3"/>
<text x="911" y="165" text-anchor="middle" font-size="14" font-weight="700" fill="#c2410c">C2 + C1 coupling</text>
<rect x="1010" y="210" width="142" height="58" rx="12" fill="white" stroke="#c2410c" stroke-width="3"/>
<text x="1081" y="245" text-anchor="middle" font-size="14" font-weight="700" fill="#c2410c">C3 oxygenates</text>
<rect x="430" y="325" width="142" height="58" rx="12" fill="white" stroke="#7c3aed" stroke-width="3"/>
<text x="501" y="360" text-anchor="middle" font-size="14" font-weight="700" fill="#7c3aed">Ru-H / water activation</text>
<rect x="675" y="325" width="142" height="58" rx="12" fill="white" stroke="#7c3aed" stroke-width="3"/>
<text x="746" y="360" text-anchor="middle" font-size="14" font-weight="700" fill="#7c3aed">Hydrogenated C2 intermediate</text>
<rect x="250" y="500" width="142" height="58" rx="12" fill="white" stroke="#1f2328" stroke-width="3"/>
<text x="321" y="535" text-anchor="middle" font-size="14" font-weight="700" fill="#1f2328">Local pH and CO coverage</text>
<rect x="525" y="500" width="142" height="58" rx="12" fill="white" stroke="#b45309" stroke-width="3"/>
<text x="596" y="535" text-anchor="middle" font-size="14" font-weight="700" fill="#b45309">Cu(100)/(111) interface</text>
<rect x="815" y="500" width="142" height="58" rx="12" fill="white" stroke="#1f2328" stroke-width="3"/>
<text x="886" y="535" text-anchor="middle" font-size="14" font-weight="700" fill="#1f2328">Flow-cell transport</text>
<path d="M212 209 C231 209, 231 209, 250 209" stroke="#0f766e" stroke-width="3" fill="none" marker-end="url(#arrow)"/>
<path d="M392 209 C421 209, 421 160, 450 160" stroke="#0f766e" stroke-width="3" fill="none" marker-end="url(#arrow)"/>
<path d="M592 160 C618.5 160, 618.5 160, 645 160" stroke="#2563eb" stroke-width="3" fill="none" marker-end="url(#arrow)"/>
<path d="M787 160 C813.5 160, 813.5 160, 840 160" stroke="#c2410c" stroke-width="3" fill="none" marker-end="url(#arrow)"/>
<path d="M982 160 C996 160, 996 210, 1010 210" stroke="#c2410c" stroke-width="3" fill="none" marker-end="url(#arrow)"/>
<path d="M572 354 C623.5 354, 623.5 354, 675 354" stroke="#7c3aed" stroke-width="3" fill="none" marker-end="url(#arrow)"/>
<path d="M817 354 C913.5 354, 913.5 238, 1010 238" stroke="#7c3aed" stroke-width="3" fill="none" marker-end="url(#arrow)"/>
<path d="M392 529 C458.5 529, 458.5 529, 525 529" stroke="#b45309" stroke-width="3" fill="none" marker-end="url(#arrow)"/>
<path d="M667 529 C741 529, 741 529, 815 529" stroke="#1f2328" stroke-width="3" fill="none" marker-end="url(#arrow)"/>
<path d="M321 500 C385.5 500, 385.5 188, 450 188" stroke="#1f2328" stroke-width="3" fill="none" marker-end="url(#arrow)"/>
<path d="M886 500 C948 500, 948 255, 1010 255" stroke="#1f2328" stroke-width="3" fill="none" marker-end="url(#arrow)"/>
<rect x="70" y="612" width="1020" height="48" rx="10" fill="#fff7ed" stroke="#fdba74"/>
<text x="580" y="642" text-anchor="middle" font-size="14" fill="#9a3412">Validation set: isotope labeling, operando Raman/SEIRAS, XAS/XPS, NMR/GC, pH transport mapping, and stability testing.</text>
<defs>
  <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
    <path d="M 0 0 L 10 5 L 0 10 z" fill="currentColor"/>
  </marker>
</defs>
</svg>