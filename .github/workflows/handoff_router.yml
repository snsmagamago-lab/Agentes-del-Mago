name: Handoff Router

on:
  workflow_dispatch:

jobs:
  route:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Install dependencies
        run: npm install

      - name: Route latest handoff
        run: npm run agent:route

      - name: Validate agent state
        run: npm run agent:validate
